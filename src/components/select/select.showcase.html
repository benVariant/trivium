<!-- components/select/select.showcase.html -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Select Showcase</title>
      
  <link rel="icon" type="image/png" href="/public/favicon.png">
  <link rel="stylesheet" href="../../styles/index.css" />
  <link rel="stylesheet" href="../../styles/showcase/showcase.css" />
  <link rel="stylesheet" href="./select.css" />

  <!-- Phosphor icons -->
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
  />
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
  />

</head>

<body>
  <main class="showcase">
    <header class="showcase__header">
      <p class="u-eyebrow">Component</p>
      <h1>Select</h1>
      <p>
        Showcase visual del componente Select para seleccionar opciones de una lista.
      </p>
    </header>

    <!-- Base States Section -->
    <section class="showcase__group">
      <h2 class="u-heading-sm u-heading-color-secondary">Base States</h2>

      <div class="showcase__row">
        <div class="c-select-field">
          <label class="c-select-label">Default</label>
          <select class="c-select md">
            <option value="">Selecciona una opción</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
        </div>

        <div class="c-select-field">
          <label class="c-select-label">Focus</label>
          <select class="c-select md" autofocus>
            <option value="">Selecciona una opción</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
        </div>

        <div class="c-select-field">
          <label class="c-select-label">Disabled</label>
          <select class="c-select md" disabled>
            <option value="">Selecciona una opción</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Validation States Section -->
    <section class="showcase__group">
      <h2 class="u-heading-sm u-heading-color-secondary">Validation States</h2>

      <div class="showcase__row" style="flex-direction: column; gap: var(--gap-600);">
        <div class="c-select-field">
          <label class="c-select-label">Success</label>
          <select class="c-select md success">
            <option value="">Selecciona una opción</option>
            <option value="option1" selected>Opción válida</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
          <span class="c-select-helper success">✓ Selección válida</span>
        </div>

        <div class="c-select-field">
          <label class="c-select-label">Error</label>
          <select class="c-select md error">
            <option value="">Selecciona una opción requerida</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
          <span class="c-select-helper error">✗ Debes seleccionar una opción</span>
        </div>
      </div>
    </section>

    <!-- Sizes Section -->
    <section class="showcase__group">
      <h2 class="u-heading-sm u-heading-color-secondary">Sizes</h2>

      <div class="showcase__row" style="flex-direction: column; gap: var(--gap-600);">
        <div class="c-select-field">
          <label class="c-select-label">Large</label>
          <select class="c-select lg">
            <option value="">Selecciona una opción</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
        </div>

        <div class="c-select-field">
          <label class="c-select-label">Medium</label>
          <select class="c-select md">
            <option value="">Selecciona una opción</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
        </div>

        <div class="c-select-field">
          <label class="c-select-label">Small</label>
          <select class="c-select sm">
            <option value="">Selecciona una opción</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
        </div>
      </div>
    </section>

    <!-- With Optgroup Section -->
    <section class="showcase__group">
      <h2 class="u-heading-sm u-heading-color-secondary">With Optgroups</h2>

      <div class="showcase__row" style="flex-direction: column; gap: var(--gap-600);">
        <div class="c-select-field">
          <label class="c-select-label">Categorías</label>
          <select class="c-select md">
            <option value="">Selecciona una categoría</option>
            <optgroup label="Frutas">
              <option value="apple">Manzana</option>
              <option value="banana">Plátano</option>
              <option value="orange">Naranja</option>
            </optgroup>
            <optgroup label="Verduras">
              <option value="carrot">Zanahoria</option>
              <option value="broccoli">Brócoli</option>
              <option value="spinach">Espinaca</option>
            </optgroup>
          </select>
        </div>

        <div class="c-select-field">
          <label class="c-select-label">Países</label>
          <select class="c-select md">
            <option value="">Selecciona un país</option>
            <optgroup label="América Latina">
              <option value="mexico">México</option>
              <option value="colombia">Colombia</option>
              <option value="argentina">Argentina</option>
            </optgroup>
            <optgroup label="Europa">
              <option value="spain">España</option>
              <option value="france">Francia</option>
              <option value="italy">Italia</option>
            </optgroup>
          </select>
        </div>
      </div>
    </section>

    <!-- With Helper Text Section -->
    <section class="showcase__group">
      <h2 class="u-heading-sm u-heading-color-secondary">With Helper Text</h2>

      <div class="showcase__row" style="flex-direction: column; gap: var(--gap-600);">
        <div class="c-select-field">
          <label class="c-select-label">Nivel de experiencia</label>
          <select class="c-select md">
            <option value="">Selecciona tu nivel</option>
            <option value="beginner">Principiante</option>
            <option value="intermediate">Intermedio</option>
            <option value="advanced">Avanzado</option>
          </select>
          <span class="c-select-helper">Esto ayuda a personalizar tu experiencia</span>
        </div>

        <div class="c-select-field">
          <label class="c-select-label">Preferencia (Requerido)</label>
          <select class="c-select md" required>
            <option value="">Selecciona una opción</option>
            <option value="option1">Opción 1</option>
            <option value="option2">Opción 2</option>
            <option value="option3">Opción 3</option>
          </select>
          <span class="c-select-helper">Campo requerido</span>
        </div>
      </div>
    </section>

  </main>
</body>

</html>
